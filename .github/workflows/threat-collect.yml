name: Collect Threat Intelligence

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r threat-intel/collector/requirements.txt
      - name: Run collector
        env:
          VERCEL_API_URL: ${{ secrets.VERCEL_API_URL }}
          VERCEL_API_SECRET: ${{ secrets.VERCEL_API_SECRET }}
        run: python threat-intel/collector/threat_collector.py